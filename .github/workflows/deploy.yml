name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: set these as repository Variables (Settings → Secrets and
          # variables → Actions → Variables) to activate the Support modal links.
          # Unset variables are simply hidden in the UI.
          VITE_SPONSORS_URL: ${{ vars.VITE_SPONSORS_URL }}
          VITE_KOFI_URL: ${{ vars.VITE_KOFI_URL }}
          VITE_BMAC_URL: ${{ vars.VITE_BMAC_URL }}
          VITE_REPO_URL: ${{ vars.VITE_REPO_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
